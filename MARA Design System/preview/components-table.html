<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root, html.dark {
  --background: 220 40% 5%;
  --card: 220 35% 9%;
  --popover: 220 35% 11%;
  --muted: 220 30% 13%;
  --secondary: 220 30% 14%;
  --border: 220 28% 18%;
  --input: 220 30% 14%;
  --primary: 162 72% 45%;
  --primary-foreground: 220 40% 5%;
  --ring: 162 72% 45%;
  --fg1: 213 31% 92%;
  --fg2: 215 18% 75%;
  --fg3: 215 14% 55%;
  --sidebar-bg: 220 40% 4%;
  --sidebar-border: 220 28% 16%;
  --sidebar-border-subtle: 220 26% 12%;
  --sidebar-text: 215 18% 70%;
  --sidebar-text-dim: 215 14% 50%;
  --sidebar-active-color: 162 72% 65%;
  --sidebar-active-bg: 162 72% 45% / 0.14;
  --sidebar-hover: 220 30% 14% / 1;
  --sidebar-brand-color: 162 72% 65%;
  --sidebar-brand-dim: 215 14% 60%;
  --font-display: 'Sora', system-ui, sans-serif;
  --font-body:    'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  --weight-body: 500;
  --weight-body-strong: 600;
  --type-display-1: 40px;
  --type-display-2: 28px;
  --type-h1: 22px;
  --type-h2: 18px;
  --type-h3: 15px;
  --type-body: 14px;
  --type-small: 12.5px;
  --type-tiny: 11px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
  --radius-xs: 4px; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px; --radius-xl: 14px; --radius-2xl: 20px;
  --shadow-sm: 0 1px 2px hsl(220 40% 0% / 0.4);
  --shadow-md: 0 4px 12px hsl(220 40% 0% / 0.45);
  --shadow-lg: 0 12px 32px hsl(220 40% 0% / 0.55);
  --shadow-glow: 0 0 32px hsl(162 72% 45% / 0.25);
}
html.light, .light {
  --background: 40 23% 95%;
  --card: 0 0% 100%;
  --popover: 0 0% 100%;
  --muted: 40 12% 90%;
  --secondary: 40 12% 88%;
  --border: 40 12% 86%;
  --input: 40 14% 92%;
  --primary: 162 65% 32%;
  --primary-foreground: 0 0% 100%;
  --ring: 162 65% 32%;
  --fg1: 220 40% 10%;
  --fg2: 220 16% 28%;
  --fg3: 220 12% 46%;
}
</style>
<style>
  body { margin: 0; padding: 12px 14px; background: hsl(var(--background)); color: hsl(var(--fg1)); font-family: var(--font-body); }
  .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { text-align: left; padding: 10px 14px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: hsl(var(--fg3)); background: hsl(var(--muted) / 0.5); border-bottom: 1px solid hsl(var(--border)); }
  td { padding: 10px 14px; border-bottom: 1px solid hsl(var(--border)); color: hsl(var(--fg1)); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: hsl(var(--muted) / 0.4); }
  .mono { font-family: var(--font-mono); font-size: 11.5px; color: hsl(var(--fg2)); }
  .pill { display: inline-flex; padding: 2px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 600; background: hsl(var(--badge-active-bg)); color: hsl(var(--badge-active-text)); }
</style>
</head>
<body>
<div class="card">
<table>
  <thead><tr><th>Aluno</th><th>CPF</th><th>Curso</th><th>Status</th></tr></thead>
  <tbody>
    <tr><td>Maria Silva Santos</td><td class="mono">123.456.789-00</td><td>Auxiliar Administrativo</td><td><span class="pill">Ativo</span></td></tr>
    <tr><td>João Pedro Lima</td><td class="mono">987.654.321-00</td><td>Eletricista Industrial</td><td><span class="pill">Ativo</span></td></tr>
    <tr><td>Ana Costa Ribeiro</td><td class="mono">456.789.123-00</td><td>Confeitaria</td><td><span class="pill" style="background:hsl(var(--badge-recent-bg));color:hsl(var(--badge-recent-text))">Pendente</span></td></tr>
  </tbody>
</table>
</div>
</body>
</html>
