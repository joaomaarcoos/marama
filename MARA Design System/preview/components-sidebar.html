<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root, html.dark {
  --background: 220 40% 5%;
  --card: 220 35% 9%;
  --popover: 220 35% 11%;
  --muted: 220 30% 13%;
  --secondary: 220 30% 14%;
  --border: 220 28% 18%;
  --input: 220 30% 14%;
  --primary: 162 72% 45%;
  --primary-foreground: 220 40% 5%;
  --ring: 162 72% 45%;
  --fg1: 213 31% 92%;
  --fg2: 215 18% 75%;
  --fg3: 215 14% 55%;
  --sidebar-bg: 220 40% 4%;
  --sidebar-border: 220 28% 16%;
  --sidebar-border-subtle: 220 26% 12%;
  --sidebar-text: 215 18% 70%;
  --sidebar-text-dim: 215 14% 50%;
  --sidebar-active-color: 162 72% 65%;
  --sidebar-active-bg: 162 72% 45% / 0.14;
  --sidebar-hover: 220 30% 14% / 1;
  --sidebar-brand-color: 162 72% 65%;
  --sidebar-brand-dim: 215 14% 60%;
  --font-display: 'Sora', system-ui, sans-serif;
  --font-body:    'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  --weight-body: 500;
  --weight-body-strong: 600;
  --type-display-1: 40px;
  --type-display-2: 28px;
  --type-h1: 22px;
  --type-h2: 18px;
  --type-h3: 15px;
  --type-body: 14px;
  --type-small: 12.5px;
  --type-tiny: 11px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
  --radius-xs: 4px; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px; --radius-xl: 14px; --radius-2xl: 20px;
  --shadow-sm: 0 1px 2px hsl(220 40% 0% / 0.4);
  --shadow-md: 0 4px 12px hsl(220 40% 0% / 0.45);
  --shadow-lg: 0 12px 32px hsl(220 40% 0% / 0.55);
  --shadow-glow: 0 0 32px hsl(162 72% 45% / 0.25);
}
html.light, .light {
  --background: 40 23% 95%;
  --card: 0 0% 100%;
  --popover: 0 0% 100%;
  --muted: 40 12% 90%;
  --secondary: 40 12% 88%;
  --border: 40 12% 86%;
  --input: 40 14% 92%;
  --primary: 162 65% 32%;
  --primary-foreground: 0 0% 100%;
  --ring: 162 65% 32%;
  --fg1: 220 40% 10%;
  --fg2: 220 16% 28%;
  --fg3: 220 12% 46%;
}
</style>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; padding: 0; background: hsl(var(--background)); color: hsl(var(--fg1)); font-family: var(--font-body); display: flex; height: 360px; }
  aside { width: 224px; background: hsl(var(--sidebar-bg)); border-right: 1px solid hsl(var(--sidebar-border)); padding: 14px 10px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 8px; padding: 6px 8px 14px; border-bottom: 1px solid hsl(var(--sidebar-border-subtle)); margin-bottom: 8px; }
  .brand .orb { width: 26px; height: 26px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, hsl(var(--primary)) 30%, hsl(var(--primary)/0.4) 60%, transparent 80%); position: relative; }
  .brand .orb::after { content: 'M'; position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;font-family:var(--font-display);font-weight:800;font-size:12px; }
  .brand .name { font-family: var(--font-display); font-style: italic; font-weight: 700; font-size: 14px; color: hsl(var(--sidebar-brand-color)); letter-spacing: 0.04em; text-shadow: 0 0 14px hsl(var(--primary) / 0.4); }
  .section { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: hsl(var(--sidebar-text-dim)); padding: 12px 10px 4px; }
  .item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 6px; color: hsl(var(--sidebar-text)); font-size: 12.5px; font-weight: 500; cursor: pointer; position: relative; transition: all 0.15s; }
  .item:hover { background: hsl(var(--sidebar-hover)); color: hsl(var(--fg1)); }
  .item.active { background: hsl(var(--sidebar-active-bg)); color: hsl(var(--sidebar-active-color)); }
  .item.active::before { content:''; position:absolute; left:-10px; top:9px; bottom:9px; width: 2px; background: hsl(var(--sidebar-active-color)); border-radius: 0 2px 2px 0; box-shadow: 0 0 8px hsl(var(--sidebar-active-color) / 0.6); }
  .item [data-lucide] { width: 14px; height: 14px; flex-shrink: 0; }
  .sublabel { font-size: 10px; color: hsl(var(--sidebar-text-dim)); margin-left: auto; font-weight: 400; }
  main { padding: 18px 22px; }
  h1 { margin: 0 0 4px; }
  .sub { color: hsl(var(--fg2)); font-size: 13px; }
</style>
</head>
<body>
<aside>
  <div class="brand"><span class="orb"></span><span class="name">MARA</span></div>
  <div class="section">Visão Geral</div>
  <div class="item"><i data-lucide="layout-dashboard"></i>Dashboard</div>
  <div class="section">Atendimento</div>
  <div class="item active"><i data-lucide="message-square"></i>Conversas MARA</div>
  <div class="item"><i data-lucide="messages-square"></i>Coord. WhatsApp</div>
  <div class="section">Conteúdo</div>
  <div class="item"><i data-lucide="file-text"></i>Prompt da MARA</div>
  <div class="item"><i data-lucide="book-open"></i>Base de Conhecimento</div>
  <div class="item"><i data-lucide="send"></i>Disparos</div>
</aside>
<main>
  <h1>Sidebar IA</h1>
  <p class="sub">Active item: lit primary bar at left edge with glow, tinted background, brighter text. Sections in micro-uppercase. 224px fixed width.</p>
</main>
<script>lucide.createIcons();</script>
</body>
</html>
