<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px 18px; background: hsl(220 40% 5%); color: #dde2ec; font-family: 'Inter', system-ui, sans-serif; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { border-radius: 8px; padding: 10px 11px; height: 76px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid hsl(220 28% 18%); color: #dde2ec; }
  .sw .name { font-family: 'Sora', system-ui, sans-serif; font-size: 11.5px; font-weight: 700; }
  .sw .hsl  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; opacity: 0.85; }
  .label    { font-size: 11px; color: #8a93a6; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="label">Dark theme · canvas + surface stack</div>
<div class="row">
  <div class="sw" style="background:hsl(220 40% 5%)"><span class="name">background</span><span class="hsl">220 40% 5%</span></div>
  <div class="sw" style="background:hsl(220 40% 4%)"><span class="name">sidebar-bg</span><span class="hsl">220 40% 4%</span></div>
  <div class="sw" style="background:hsl(220 35% 9%)"><span class="name">card</span><span class="hsl">220 35% 9%</span></div>
  <div class="sw" style="background:hsl(220 35% 11%)"><span class="name">popover</span><span class="hsl">220 35% 11%</span></div>
  <div class="sw" style="background:hsl(220 30% 13%)"><span class="name">muted</span><span class="hsl">220 30% 13%</span></div>
  <div class="sw" style="background:hsl(220 28% 18%)"><span class="name">border</span><span class="hsl">220 28% 18%</span></div>
</div>
</body>
</html>
