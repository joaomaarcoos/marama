<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root, html.dark {
  --background: 220 40% 5%;
  --card: 220 35% 9%;
  --popover: 220 35% 11%;
  --muted: 220 30% 13%;
  --secondary: 220 30% 14%;
  --border: 220 28% 18%;
  --input: 220 30% 14%;
  --primary: 162 72% 45%;
  --primary-foreground: 220 40% 5%;
  --ring: 162 72% 45%;
  --fg1: 213 31% 92%;
  --fg2: 215 18% 75%;
  --fg3: 215 14% 55%;
  --sidebar-bg: 220 40% 4%;
  --sidebar-border: 220 28% 16%;
  --sidebar-border-subtle: 220 26% 12%;
  --sidebar-text: 215 18% 70%;
  --sidebar-text-dim: 215 14% 50%;
  --sidebar-active-color: 162 72% 65%;
  --sidebar-active-bg: 162 72% 45% / 0.14;
  --sidebar-hover: 220 30% 14% / 1;
  --sidebar-brand-color: 162 72% 65%;
  --sidebar-brand-dim: 215 14% 60%;
  --font-display: 'Sora', system-ui, sans-serif;
  --font-body:    'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  --weight-body: 500;
  --weight-body-strong: 600;
  --type-display-1: 40px;
  --type-display-2: 28px;
  --type-h1: 22px;
  --type-h2: 18px;
  --type-h3: 15px;
  --type-body: 14px;
  --type-small: 12.5px;
  --type-tiny: 11px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
  --radius-xs: 4px; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px; --radius-xl: 14px; --radius-2xl: 20px;
  --shadow-sm: 0 1px 2px hsl(220 40% 0% / 0.4);
  --shadow-md: 0 4px 12px hsl(220 40% 0% / 0.45);
  --shadow-lg: 0 12px 32px hsl(220 40% 0% / 0.55);
  --shadow-glow: 0 0 32px hsl(162 72% 45% / 0.25);
}
html.light, .light {
  --background: 40 23% 95%;
  --card: 0 0% 100%;
  --popover: 0 0% 100%;
  --muted: 40 12% 90%;
  --secondary: 40 12% 88%;
  --border: 40 12% 86%;
  --input: 40 14% 92%;
  --primary: 162 65% 32%;
  --primary-foreground: 0 0% 100%;
  --ring: 162 65% 32%;
  --fg1: 220 40% 10%;
  --fg2: 220 16% 28%;
  --fg3: 220 12% 46%;
}
</style>
<style>
  body { margin: 0; padding: 16px 18px; background: hsl(var(--background)); color: hsl(var(--fg1)); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: 10px; padding: 12px; height: 92px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid hsl(var(--border)); border-top-width: 2px; }
  .sw .name { font-family: var(--font-display); font-size: 12.5px; font-weight: 700; color: hsl(var(--fg1)); }
  .sw .role { font-family: var(--font-body); font-size: 11px; color: hsl(var(--fg2)); }
  .sw .hsl { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--fg3)); }
  .label { font-size: 11px; color: hsl(var(--fg3)); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="label">Semantic accents · dashboard card top-borders (2px)</div>
<div class="row">
  <div class="sw" style="background:hsl(220 40% 8%);border-top-color:hsl(217 91% 60%)">
    <div><div class="name">Conversas</div><div class="role">Blue · live chat</div></div><div class="hsl">217 91% 60%</div>
  </div>
  <div class="sw" style="background:hsl(220 40% 8%);border-top-color:hsl(160 84% 39%)">
    <div><div class="name">Alunos</div><div class="role">Green · synced</div></div><div class="hsl">160 84% 39%</div>
  </div>
  <div class="sw" style="background:hsl(220 40% 8%);border-top-color:hsl(38 92% 50%)">
    <div><div class="name">Disparos</div><div class="role">Amber · campaigns</div></div><div class="hsl">38 92% 50%</div>
  </div>
  <div class="sw" style="background:hsl(220 40% 8%);border-top-color:hsl(262 80% 65%)">
    <div><div class="name">Prompt</div><div class="role">Violet · config</div></div><div class="hsl">262 80% 65%</div>
  </div>
</div>
</body>
</html>
