version: '3.8'

services:
  sistemamara:
    image: sistemamara:latest
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME}
      MOODLE_URL: ${MOODLE_URL}
      MOODLE_WSTOKEN: ${MOODLE_WSTOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_EVOLUTION_INSTANCE: ${NEXT_PUBLIC_EVOLUTION_INSTANCE:-marav2}
      NEXT_PUBLIC_INSTANCE_NAME: ${NEXT_PUBLIC_INSTANCE_NAME:-marav2}
    networks:
      - JoaoDantasMAnet
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        - traefik.enable=1
        - traefik.http.routers.sistemamara.rule=Host(`mara.joaodantasia.com.br`)
        - traefik.http.routers.sistemamara.entrypoints=websecure
        - traefik.http.routers.sistemamara.priority=1
        - traefik.http.routers.sistemamara.tls.certresolver=letsencryptresolver
        - traefik.http.routers.sistemamara.service=sistemamara
        - traefik.http.services.sistemamara.loadbalancer.server.port=3000
        - traefik.http.services.sistemamara.loadbalancer.passHostHeader=true

networks:
  JoaoDantasMAnet:
    external: true
    name: JoaoDantasMAnet
